# JTSFTM memory description for JTFRAME (`jtframe mem sftm`).
# Lives in cfg/ (jtframe reads $JTROOT/cores/<core>/cfg/mem.yaml).
# Generates jtsftm_game_sdram.v (in cores/sftm/mister/) and mem_ports.inc.
#
# ROM regions — download order must match SDRAM bank order (see cfg/mame2mra.toml):
#   prog   1.00 MB  4x256KB PROMs, 32-bit interleaved   (68EC020 program)
#   snd    0.25 MB  sound CPU (6809)
#   grom  32.00 MB  rm0-0..3 + rm1-0..3 (blitter graphics)
#   grm3   0.50 MB  sfm_grm3_0..3 (extra graphics plane)
#   srom   2.50 MB  srom0 (2MB) + srom3 (512KB)  (ES5506 samples)
#
# Total ~36 MB -> requires the 128 MB SDRAM module. Banks are split so the big
# 32 MB grom lives alone and the blitter (grom) and ES5506 (srom) never share a
# bank, minimising read contention.
#
# NOTE: addr_width values are word addresses for the given data_width. Final
# offsets/boundaries must be confirmed against the generated *_sdram.v and kept
# consistent with mame2mra.toml.

clocks:
  clk:                # 48 MHz reference
    - freq: 25000000  # ~MC68EC020 @ 25 MHz (functional TG68K, tuned to vsync)
      outputs:
        - e020
    - freq: 16000000  # Ensoniq ES5506 master
      outputs:
        - es
    - freq: 2000000   # MC6809 E clock
      outputs:
        - snd

sdram:
  banks:
    # ---- bank 0: program + sound CPU ------------------------------------
    - buses:
        - name: prog          # 68EC020 program, 32-bit
          addr_width: 18       # 256K longwords = 1 MB
          data_width: 32
        - name: snd           # 6809 program, 8-bit
          addr_width: 18       # up to 256 KB
          data_width: 8
    # ---- bank 1: ES5506 sample ROM (16-bit words) -----------------------
    - buses:
        - name: srom
          addr_width: 21       # up to 2 Mword (banked internally by ES5506)
          data_width: 16
    # ---- bank 2: main graphics (32 MB, 128 MB module required) ----------
    - buses:
        - name: grom          # blitter source data
          addr_width: 24       # 16 Mword = 32 MB @ 16-bit
          data_width: 16
    # ---- bank 3: extra graphics plane -----------------------------------
    - buses:
        - name: grm3
          addr_width: 18       # 512 KB @ 16-bit
          data_width: 16

  # Battery-backed NVRAM (0x600000-0x61ffff, 128 KB on the real board) is
  # currently kept in on-chip BRAM inside jtsftm_main (u_nvram) so the CPU can
  # boot and run self-test. Persistence is deferred: add a top-level bram entry
  #   bram:
  #     - name: nvram
  #       addr_width: 14        # < 64 KB: MiSTer cannot dump NVRAM >= 64 KB
  #       data_width: 16
  #       rw: true
  #       ioctl: { save: true, order: 0 }
  # (see modules/jtframe/doc/sdram.md) once JTFRAME is vendored, then wire the
  # generated nvram_* ports back into jtsftm_main.
