# mame2mra configuration for SFTM (jtframe mame2mra format).
#
# ROM download order must match SDRAM bank assignment in macros.def:
#   BA0: maindata (1 MB, 32-bit) + soundcpu (256 KB, 8-bit)
#   BA1: ensoniq.0 (2 MB, 16-bit) + ensoniq.3 (512 KB, 16-bit)
#   BA2: grom rm0+rm1 (32 MB, 16-bit output from 32-bit interleave)
#   BA3: grom grm3 (512 KB from grom offset 0x2000000)

[global]
author   = ["SFTM contributors"]
platform = "sftm"

[parse]
sourcefile = ["itech32.cpp"]
parents    = [{name="sftm", description="Street Fighter: The Movie (v1.12)"}]
main       = "sftm"

[buttons]
[[buttons.names]]
names = "LP,MP,HP,LK,MK,HK"

[dipsw]
[[dipsw.extra]]
name = "Test Mode"
bits = "0"

[ROM]
regions = [
    # BA0: 68EC020 program ROM (4 x 256 KB, 32-bit interleaved byte lanes 0-3)
    { name="maindata", width=32 },
    # BA0: 6809 sound CPU ROM (8-bit, 256 KB loaded at MAME offset 0x10000)
    { name="soundcpu", width=8 },
    # BA1: ES5506 sample ROMs (16-bit)
    { name="ensoniq.0", width=16, start="JTFRAME_BA1_START" },
    { name="ensoniq.3", width=16 },
    # BA2: main graphics (rm0+rm1, 32 MB, 32-bit interleaved -> 16-bit SDRAM words)
    { name="grom", width=32, start="JTFRAME_BA2_START" },
    # BA3: grm3 extra graphics (512 KB from grom offset 0x2000000, 32-bit interleaved)
    # TODO: confirm mame2mra syntax for region split at MAME region offset 0x2000000
    { name="grom", width=32, start="JTFRAME_BA3_START" },
]
order = ["maindata","soundcpu","ensoniq.0","ensoniq.3","grom"]
