# mame2mra configuration for JTSFTM.
#
# This follows JTFRAME's mame2mra.toml convention but is intentionally explicit
# and conservative. The generated .mra must be validated against the jtframe
# version being used, because this core needs a non-standard 128 MB SDRAM
# layout and 32-bit interleaving for the 68EC020 program ROM.

[global]
author   = ["JTSFTM contributors"]
platform = "Street Fighter: The Movie"

# Parse settings: which MAME source file and parent set to process
[parse]
sourcefile = ["itech/itech32.cpp"]

[parse.skip]
bootlegs = true

[[parse.parents]]
name = "sftm"

# Buttons: 6 action buttons (LP MP HP LK MK HK)
[buttons]
[[buttons.names]]
names = "LP,MP,HP,LK,MK,HK"

# DIP switches
[[dipsw.extra]]
name = "Test Mode"
bits = "0"

# ROM download order MUST match SDRAM bank order (BA0 first, then BA1…BA3)
# so that JTFRAME_BA*_START in macros.def correctly partitions the stream:
#   BA0: prog (1 MB, 32-bit interleaved) + snd (256 KB)
#   BA1: srom (2.5 MB — srom0 2 MB + srom3 512 KB, ES5506 samples)
#   BA2: grom (32 MB main graphics, needs 128 MB SDRAM module)
#   BA3: grm3 (512 KB extra graphics)
#
# TODO: validate exact [[rom.regions]] syntax and region names against the
# active jtframe version's mra parser before generating a real .mra.
[[rom.regions]]
name = "maincpu"
width = 32
reverse = false

[[rom.regions]]
name = "soundcpu"
width = 8

[[rom.regions]]
name = "ensoniq.0"
width = 16

[[rom.regions]]
name = "grom"
width = 16

[[rom.regions]]
name = "grm3"
width = 16

[rom.nvram]
